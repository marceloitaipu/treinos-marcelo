<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>?? Treinos Marcelo - 7 Tipos</title>
    <meta name="description" content="App completo de treinos com controle de peso e ediçăo">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-orange: #ff6b35;
            --neon-pink:   #f72585;
            --neon-purple: #7209b7;
            --neon-blue:   #4361ee;
            --neon-cyan:   #4cc9f0;
            --neon-green:  #06d6a0;
            --neon-yellow: #ffd60a;
            --card-bg:     rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --modal-bg:    rgba(8,8,20,0.97);
            --text-muted:  #8b95a6;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #08080f;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(67,97,238,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(247,37,133,0.14) 0%, transparent 55%);
            color: #e8eaf0;
            min-height: 100vh;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            padding: 24px 20px 16px;
            background: linear-gradient(135deg, rgba(67,97,238,0.12) 0%, rgba(247,37,133,0.08) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(67,97,238,0.15), 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-orange), var(--neon-cyan));
        }

        .header h1 {
            font-size: 2.4em;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff 0%, #c9d4ff 40%, var(--neon-pink) 80%, var(--neon-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header > p {
            color: var(--text-muted);
            font-size: 0.9em;
            font-weight: 500;
        }

        .tipo-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
        }

        .tipo-btn {
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 700;
            font-size: 0.85em;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tipo-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .tipo-btn.active {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(67,97,238,0.5), 0 0 0 1px rgba(247,37,133,0.3);
            transform: translateY(-1px);
        }

        .treinos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .treino-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--card-border);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
        }

        /* Barra colorida no topo de cada card por tipo */
        .treino-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .treino-a::before { background: linear-gradient(90deg, #ff6b35, #f72585); }
        .treino-b::before { background: linear-gradient(90deg, #4cc9f0, #4361ee); }
        .treino-c::before { background: linear-gradient(90deg, #7209b7, #4361ee); }
        .treino-d::before { background: linear-gradient(90deg, #ffd60a, #ff6b35); }
        .treino-e::before { background: linear-gradient(90deg, #06d6a0, #4cc9f0); }

        .treino-card:hover {
            transform: translateY(-6px) translateZ(0);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.14);
        }

        .treino-card:active {
            transform: translateY(-2px) scale(0.99) translateZ(0);
        }

        .treino-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .treino-letra {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.35em;
            margin-right: 14px;
            flex-shrink: 0;
            color: #fff;
        }

        .treino-a .treino-letra {
            background: linear-gradient(135deg, #ff6b35, #f72585);
            box-shadow: 0 4px 20px rgba(247,37,133,0.45);
        }
        .treino-b .treino-letra {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            box-shadow: 0 4px 20px rgba(67,97,238,0.45);
        }
        .treino-c .treino-letra {
            background: linear-gradient(135deg, #7209b7, #4361ee);
            box-shadow: 0 4px 20px rgba(114,9,183,0.45);
        }
        .treino-d .treino-letra {
            background: linear-gradient(135deg, #ffd60a, #ff6b35);
            box-shadow: 0 4px 20px rgba(255,214,10,0.4);
            color: #1a0a00;
        }
        .treino-e .treino-letra {
            background: linear-gradient(135deg, #06d6a0, #4cc9f0);
            box-shadow: 0 4px 20px rgba(6,214,160,0.4);
            color: #001a14;
        }

        .treino-info h3 {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 4px;
            color: #f0f2ff;
            line-height: 1.3;
        }

        .treino-info p {
            color: var(--text-muted);
            font-size: 0.82em;
            font-weight: 500;
        }

        .treino-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-iniciar {
            flex: 1;
            padding: 13px 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4361ee, #f72585);
            color: #fff;
            font-weight: 800;
            font-size: 0.9em;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 18px rgba(67,97,238,0.35);
        }

        .btn-iniciar:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 28px rgba(67,97,238,0.55);
        }

        .btn-iniciar:active { transform: scale(0.97); }

        .btn-edit {
            padding: 13px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #c0c8e0;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 1.05em;
        }

        .btn-edit:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
            transform: scale(1.06);
        }

        .btn-edit:active { transform: scale(0.95); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(30px);
            border-radius: 22px;
            padding: 28px;
            max-width: 500px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(67,97,238,0.15);
            position: relative;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            border-radius: 22px 22px 0 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
        }

        .modal-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .modal-header h2 {
            margin-bottom: 6px;
            font-size: 1.4em;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-header p {
            color: var(--text-muted);
            font-size: 0.88em;
        }

        .exercicio-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.25s ease;
            gap: 10px;
        }

        .exercicio-item:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.12);
        }

        .exercicio-item.concluido {
            background: rgba(6,214,160,0.08);
            border-color: rgba(6,214,160,0.3);
        }

        .exercicio-info { flex: 1; }

        .exercicio-nome {
            font-weight: 700;
            font-size: 0.95em;
            margin-bottom: 4px;
            color: #e8eaf0;
        }

        .exercicio-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .peso-input {
            width: 68px;
            padding: 8px 6px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            text-align: center;
            font-size: 0.95em;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s;
        }

        .peso-input:focus {
            border-color: var(--neon-blue);
            background: rgba(67,97,238,0.1);
        }

        .peso-input::placeholder { color: rgba(255,255,255,0.35); }

        .btn-concluir {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: rgba(6,214,160,0.2);
            border: 1px solid rgba(6,214,160,0.4);
            color: #06d6a0;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            font-size: 0.82em;
            white-space: nowrap;
        }

        .btn-concluir:hover {
            background: rgba(6,214,160,0.35);
            box-shadow: 0 0 12px rgba(6,214,160,0.3);
        }

        .btn-concluir.concluido {
            background: rgba(6,214,160,0.25);
            border-color: #06d6a0;
            color: #06d6a0;
        }

        .btn-concluir:active { transform: scale(0.95); }

        .modal-footer {
            text-align: center;
            margin-top: 22px;
        }

        .btn-fechar {
            padding: 13px 36px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(67,97,238,0.25), rgba(247,37,133,0.2));
            color: #fff;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 0.03em;
        }

        .btn-fechar:hover {
            background: linear-gradient(135deg, rgba(67,97,238,0.45), rgba(247,37,133,0.35));
            box-shadow: 0 4px 20px rgba(67,97,238,0.35);
            transform: translateY(-1px);
        }

        /* Modal de ediçăo */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 700;
            font-size: 0.82em;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--neon-cyan);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #f0f2ff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--neon-blue);
            background: rgba(67,97,238,0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .exercicios-lista {
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
        }

        .exercicio-edit {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            transition: background 0.2s;
        }

        .exercicio-edit:hover { background: rgba(255,255,255,0.07); }

        .exercicio-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 7px;
            background: rgba(255,255,255,0.06);
            color: #f0f2ff;
            font-size: 0.95em;
            font-family: inherit;
            outline: none;
        }

        .exercicio-input:focus {
            border-color: var(--neon-blue);
            background: rgba(67,97,238,0.08);
        }

        .btn-remove {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            color: #f87171;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            min-width: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: rgba(239,68,68,0.5);
            color: #fff;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            border: 1px dashed rgba(6,214,160,0.4);
            border-radius: 10px;
            background: rgba(6,214,160,0.06);
            color: var(--neon-green);
            cursor: pointer;
            margin-top: 10px;
            font-weight: 700;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: rgba(6,214,160,0.15);
            border-color: var(--neon-green);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .btn-salvar {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #06d6a0, #4361ee);
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.95em;
            box-shadow: 0 4px 18px rgba(6,214,160,0.3);
        }

        .btn-salvar:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(6,214,160,0.45);
        }

        .btn-cancelar {
            flex: 1;
            padding: 13px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.95em;
        }

        .btn-cancelar:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* Notificaçőes */
        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            left: 16px;
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 0.92em;
            z-index: 9999;
            animation: notifSlide 0.35s cubic-bezier(0.34,1.56,0.64,1);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .notification.success {
            background: linear-gradient(135deg, rgba(6,214,160,0.85), rgba(67,97,238,0.75));
            box-shadow: 0 8px 32px rgba(6,214,160,0.3);
        }

        .notification.warning {
            background: linear-gradient(135deg, rgba(255,193,7,0.85), rgba(255,107,53,0.75));
            box-shadow: 0 8px 32px rgba(255,193,7,0.3);
        }

        @keyframes notifSlide {
            from { transform: translateY(-120%) scale(0.9); opacity: 0; }
            to   { transform: translateY(0) scale(1);       opacity: 1; }
        }

        /* Feedback touch */
        .tipo-btn:active    { transform: scale(0.95); }
        .btn-iniciar:active { transform: scale(0.96); }
        .btn-edit:active    { transform: scale(0.95); }
        .btn-concluir:active{ transform: scale(0.95); }

        /* Responsivo otimizado para Poco X7 Pro e outros celulares */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            
            .header {
                padding: 16px;
                margin-bottom: 16px;
            }
            
            .header h1 { 
                font-size: 2em; 
                margin-bottom: 8px;
            }
            
            .header p {
                font-size: 0.95em;
                opacity: 0.9;
            }
            
            .tipo-selector {
                gap: 8px;
                margin-bottom: 16px;
                padding: 0 4px;
            }
            
            .tipo-btn { 
                padding: 12px 16px; 
                font-size: 0.9em;
                min-width: auto;
                flex: 1;
                max-width: 140px;
            }
            
            .treinos-grid { 
                grid-template-columns: 1fr;
                gap: 16px;
                max-width: 100%;
            }
            
            .treino-card {
                padding: 18px;
                margin: 0;
            }
            
            .treino-header {
                margin-bottom: 12px;
            }
            
            .treino-letra {
                width: 45px;
                height: 45px;
                font-size: 1.1em;
                margin-right: 12px;
            }
            
            .treino-info h3 {
                font-size: 1.1em;
                line-height: 1.3;
                margin-bottom: 4px;
            }
            
            .treino-info p {
                font-size: 0.85em;
                line-height: 1.2;
            }
            
            .treino-actions {
                gap: 8px;
                margin-top: 12px;
            }
            
            .btn-iniciar {
                padding: 14px;
                font-size: 0.95em;
            }
            
            .btn-edit {
                padding: 14px 18px;
                font-size: 1.1em;
            }
        }

        /* Otimizaçăo específica para telas grandes de celular (Poco X7 Pro) */
        @media (min-width: 390px) and (max-width: 768px) {
            .tipo-selector {
                justify-content: flex-start;
                overflow-x: auto;
                padding: 0 8px 8px 8px;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            
            .tipo-selector::-webkit-scrollbar {
                display: none;
            }
            
            .tipo-btn {
                flex-shrink: 0;
                white-space: nowrap;
            }
            
            .treinos-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 14px;
            }
        }

        /* Modal responsivo */
        @media (max-width: 768px) {
            .modal-overlay {
                padding: 12px;
                align-items: flex-start;
                padding-top: 20px;
            }
            
            .modal-content { 
                padding: 20px;
                margin: 0;
                width: 100%;
                max-width: 100%;
                max-height: calc(100vh - 40px);
                border-radius: 16px;
            }
            
            .modal-header h2 {
                font-size: 1.4em;
                margin-bottom: 8px;
            }
            
            .modal-header p {
                font-size: 0.9em;
            }
            
            .exercicio-item {
                padding: 14px;
                margin-bottom: 12px;
                border-radius: 8px;
            }
            
            .exercicio-nome {
                font-size: 0.95em;

        // =============================================
        //  UTILITÁRIOS DE SEGURANÇA
        // =============================================
        function esc(str) {
            // Escapa texto para inserçăo segura em HTML (previne XSS)
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
    <script>
        // =============================================
        //  ESTADO DA APLICAÇĂO
        // =============================================
        let tipoAtualIndex = 0;

        // =============================================
        //  TIMER DE DESCANSO
        // =============================================
        let timerInterval = null;
        let timerTotal    = 60;
        let timerAtual    = 60;
        let timerRodando  = false;
        let _timerModalId = null; // ID do modal que criou o timer

        function criarTimerHTML(descansoSugerido) {
            const seg = descansoSugerido || 60;
            return `
            <div class="timer-container" id="timerBox">
                <div class="timer-titulo">?? TIMER DE DESCANSO</div>
                <div class="timer-progress"><div class="timer-progress-bar" id="timerBar" style="width:0%"></div></div>
                <div class="timer-display normal" id="timerDisplay">01:00</div>
                <div class="timer-config">
                    <label>Tempo (s):</label>
                    <input type="number" class="timer-input" id="timerInputSeg" min="5" max="600" value="${seg}">
                    <button class="timer-btn-set" onclick="definirTimer()">OK</button>
                </div>
                <div class="timer-controles">
                    <button class="timer-btn play" id="timerBtnPlay" onclick="toggleTimer()">?? Iniciar</button>
                    <button class="timer-btn reset" onclick="resetarTimer()">?? Reset</button>
                </div>
            </div>`;
        }

        function definirTimer() {
            const input = document.getElementById('timerInputSeg');
            const val   = parseInt(input.value);
            if (!val || val < 5 || val > 600) {
                mostrarNotificacao('?? Digite um tempo entre 5 e 600 segundos', 'warning');
                return;
            }
            pararTimer();
            timerTotal  = val;
            timerAtual  = val;
            atualizarDisplayTimer();
        }

        function toggleTimer() {
            if (timerRodando) {
                pararTimer();
            } else {
                iniciarTimer();
            }
        }

        function iniciarTimer() {
            if (timerAtual <= 0) resetarTimer();
            timerRodando = true;
            const btn = document.getElementById('timerBtnPlay');
            if (btn) { btn.textContent = '?? Pausar'; btn.className = 'timer-btn pause'; }

            timerInterval = setInterval(() => {
                timerAtual--;
                atualizarDisplayTimer();
                if (timerAtual <= 0) {
                    pararTimer();
                    timerConcluido();
                }
            }, 1000);
        }

        function pararTimer() {
            timerRodando = false;
            clearInterval(timerInterval);
            timerInterval = null;
            const btn = document.getElementById('timerBtnPlay');
            if (btn) { btn.textContent = '?? Iniciar'; btn.className = 'timer-btn play'; }
        }

        function resetarTimer() {
            pararTimer();
            timerAtual = timerTotal;
            atualizarDisplayTimer();
            const display = document.getElementById('timerDisplay');
            if (display) display.classList.remove('fim');
        }

        function atualizarDisplayTimer() {
            const display = document.getElementById('timerDisplay');
            const bar     = document.getElementById('timerBar');
            if (!display) return;

            const mins = Math.floor(timerAtual / 60);
            const secs = timerAtual % 60;
            display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

            const pct = timerTotal > 0 ? ((timerTotal - timerAtual) / timerTotal) * 100 : 0;
            if (bar) bar.style.width = pct + '%';

            // Cor: vermelho quando < 10s
            display.className = 'timer-display ' + (timerAtual <= 10 ? 'urgente' : 'normal');
        }

            const display = document.getElementById('timerDisplay');

        // Normaliza exercícios: aceita string ou objeto {nome,...}
        function normalizarExercicios(lista) {
            if (!Array.isArray(lista)) return lista;
            return lista.map(function(tipo) {
                if (!tipo || !Array.isArray(tipo.treinos)) return tipo;
                tipo.treinos = tipo.treinos.map(function(t) {
                    if (!Array.isArray(t.exercicios)) return t;
                    t.exercicios = t.exercicios.map(function(ex) {
                        return (typeof ex === 'object' && ex !== null && ex.nome) ? ex.nome : String(ex);
                    });
                    return t;
                });
                return tipo;
            });
        }
            console.log('?? Inicializando Treinos Marcelo com 7 tipos...');
            carregarTreinosSalvos();
            carregarTreinos();

            // Fechar modal com Escape
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') fecharModal();
            });

            console.log('? App carregado!');
        });

        function carregarTreinosSalvos() {
            // Suporta chave nova ('marceloTreinos') e legada ('marceloTreinosV2', 'treinos')
            const raw = localStorage.getItem('marceloTreinos')
                     || localStorage.getItem('marceloTreinosV2')
                     || localStorage.getItem('treinos');
            if (!raw) return;
            try {
                const dados = JSON.parse(raw);
                const lista = Array.isArray(dados) ? dados : (dados.treinos || dados.tipos || []);
                if (!Array.isArray(lista) || lista.length === 0) return;
                const normalizada = normalizarExercicios(lista);
                normalizada.forEach((tipo, i) => {
                    if (!tipo || !tipo.treinos) return;
                    if (i < todosTipos.length) {
                        todosTipos[i] = tipo;
                    } else {
                        todosTipos.push(tipo);
                    }
                });
                // Migra histórico legado (chave 'historicoTreinos' ? 'marceloHistorico')
                const histLegado = localStorage.getItem('historicoTreinos');
                if (histLegado && !localStorage.getItem('marceloHistorico')) {
                    localStorage.setItem('marceloHistorico', histLegado);
                }
                console.log('? Treinos carregados (' + normalizada.length + ' tipos)');
            } catch (e) {
                console.warn('?? Erro ao carregar treinos salvos, usando padrőes');
            }
        }

        function salvarTodosOsTreinos() {
            localStorage.setItem('marceloTreinos', JSON.stringify(todosTipos));
        }

        function carregarTreinos() {
            const tipoSelector = document.getElementById('tipoSelector');
            tipoSelector.innerHTML = '';

            todosTipos.forEach((tipo, index) => {
                const btn = document.createElement('button');
                btn.className = 'tipo-btn' + (index === tipoAtualIndex ? ' active' : '');
                btn.textContent = tipo.nome;
                btn.onclick = () => selecionarTipo(index);
                tipoSelector.appendChild(btn);
            });

            carregarTreinosTipo(tipoAtualIndex);
        }

        function selecionarTipo(index) {
            tipoAtualIndex = index;
            document.querySelectorAll('.tipo-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            carregarTreinosTipo(index);
        }

        function carregarTreinosTipo(tipoIndex) {
            const container = document.getElementById('treinosContainer');
            const tipo = todosTipos[tipoIndex];
            container.innerHTML = '';

            tipo.treinos.forEach((treino, index) => {
                const card = document.createElement('div');
                card.className = 'treino-card ' + treino.classe;

                // Contar exercícios concluídos
                let totalConcluidos = 0;
                treino.exercicios.forEach((_, i) => {
                    if (localStorage.getItem(`concluido_${tipoIndex}_${index}_${i}`) === 'true') totalConcluidos++;
                });
                const progresso = treino.exercicios.length > 0
                    ? Math.round((totalConcluidos / treino.exercicios.length) * 100) : 0;

                card.innerHTML = `
                    <div class="treino-header">
                        <div class="treino-letra">${esc(treino.letra)}</div>
                        <div class="treino-info">
                            <h3>${esc(treino.nome)}</h3>
                            <p>${esc(treino.descricao)}</p>
                            ${progresso > 0 ? `<span class="serie-badge ${progresso === 100 ? 'completo' : ''}">
                                ${progresso === 100 ? '?' : '??'} ${progresso}% feito
                            </span>` : ''}
                        </div>
                    </div>
                    <div class="treino-actions">
                        <button class="btn-iniciar" onclick="iniciarTreino(${index})">
                            ?? Iniciar Treino
                        </button>
                        <button class="btn-edit" onclick="editarTreino(${index})" title="Editar treino">
                            ??
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // =============================================
        //  PESO / SÉRIES / CONCLUSĂO
        // =============================================
        function salvarPeso(tipoIndex, treinoIndex, exercicioIndex, peso) {
            // BUG FIX: rejeitar negativos
            const val = parseFloat(peso);
            const input = document.getElementById(`pesoInput_${exercicioIndex}`);
            if (isNaN(val) || val < 0) {
                if (input) input.value = '';
                localStorage.removeItem(`peso_${tipoIndex}_${treinoIndex}_${exercicioIndex}`);
                mostrarNotificacao('?? Peso deve ser 0 ou positivo', 'warning');
                return;
            }
            localStorage.setItem(`peso_${tipoIndex}_${treinoIndex}_${exercicioIndex}`, val);
        }

        function ajustarSeries(tipoIndex, treinoIndex, exercicioIndex, delta) {
            const key     = `series_${tipoIndex}_${treinoIndex}_${exercicioIndex}`;
            const atual   = parseInt(localStorage.getItem(key)) || 0;
            const novo    = Math.max(0, atual + delta);
            localStorage.setItem(key, novo);

            const contador = document.getElementById(`serieCount_${exercicioIndex}`);
            const info     = document.getElementById(`seriesInfo_${exercicioIndex}`);
            if (contador) contador.textContent = novo;
            if (info) info.textContent = novo > 0 ? `${novo} série(s) feita(s)` : '';

            // Auto-iniciar timer ao confirmar uma série
            if (delta > 0) {
                resetarTimer();
                iniciarTimer();
                mostrarNotificacao('?? Timer de descanso iniciado!');
            }
        }

        function toggleConcluido(tipoIndex, treinoIndex, exercicioIndex, button) {
            const key = `concluido_${tipoIndex}_${treinoIndex}_${exercicioIndex}`;
            const item = button.closest('.exercicio-item');
            const jaFeito = item.classList.contains('concluido');

            if (jaFeito) {
                item.classList.remove('concluido');
                button.classList.remove('concluido');
                button.textContent = 'Concluir';
                localStorage.removeItem(key);
                mostrarNotificacao('?? Exercício desmarcado');
            } else {
                item.classList.add('concluido');
                button.classList.add('concluido');
                button.textContent = '? Feito';
                localStorage.setItem(key, 'true');
                mostrarNotificacao('? Exercício concluído!');
            }
        }

        function criarItemExercicioEdicao(nomeExercicio, i) {
            const div = document.createElement('div');
            div.className = 'exercicio-edit';

            const btn = document.createElement('button');
            btn.className = 'btn-remove';
            btn.textContent = '×';
            btn.onclick = () => removerExercicio(div);

            const input = document.createElement('input');
            input.type = 'text';
            input.value = nomeExercicio; // valor definido via .value — sem risco de XSS
            input.className = 'exercicio-input';
            input.dataset.index = i;
            input.placeholder = 'Nome do exercício';

            div.appendChild(btn);
            div.appendChild(input);
            return div;
        }

        function removerExercicio(itemDiv) {
            const lista   = document.getElementById('exercicios-lista');
            const itens   = lista.querySelectorAll('.exercicio-edit');
            if (itens.length <= 1) {
                mostrarNotificacao('?? Năo é possível remover o último exercício!', 'warning');
                return;
            }
            itemDiv.remove();
            // Reindexar data-index
            lista.querySelectorAll('.exercicio-edit').forEach((el, idx) => {
                el.querySelector('.exercicio-input').dataset.index = idx;
            });
            mostrarNotificacao('??? Exercício removido!', 'warning');
        }

            const lista     = document.getElementById('exercicios-lista');
            const btnAdd    = lista.querySelector('.btn-add');
            const novos     = lista.querySelectorAll('.exercicio-edit');
            const novoItem  = criarItemExercicioEdicao('Novo Exercício', novos.length);
            lista.insertBefore(novoItem, btnAdd);
            const inp = novoItem.querySelector('.exercicio-input');
            inp.focus();
            inp.select();
            mostrarNotificacao('? Novo exercício adicionado!');
        }

        function salvarEdicaoTreino(index) {
            const novoNome = document.getElementById('edit-nome').value.trim();
            const novaDesc = document.getElementById('edit-descricao').value.trim();

            if (!novoNome) {
                mostrarNotificacao('?? Nome do treino é obrigatório!', 'warning');
                return;
            }

            const inputs = document.querySelectorAll('#exercicios-lista .exercicio-input');
            const novosExercicios = [];
            inputs.forEach(inp => {
                const v = inp.value.trim();
                if (v) novosExercicios.push(v);
            });

            if (novosExercicios.length === 0) {
                mostrarNotificacao('?? Pelo menos um exercício é obrigatório!', 'warning');
                return;
            }

            todosTipos[tipoAtualIndex].treinos[index].nome       = novoNome;
            todosTipos[tipoAtualIndex].treinos[index].descricao  = novaDesc;
            todosTipos[tipoAtualIndex].treinos[index].exercicios = novosExercicios;

            salvarTodosOsTreinos();
            fecharModal();
            carregarTreinos();
            mostrarNotificacao('?? Treino salvo com sucesso!');
        }

        // =============================================
        //  FECHAR MODAIS
        // =============================================
        function fecharModal() {
            pararTimer();
            document.querySelectorAll('.modal-overlay').forEach(m => {
                if (document.body.contains(m)) document.body.removeChild(m);
            });
        }

        // =============================================
        //  HISTÓRICO DE TREINOS
        // =============================================
        function registrarHistorico(treinoNome, exercicios) {
            const hist = JSON.parse(localStorage.getItem('marceloHistorico') || '[]');
            hist.unshift({
                data: new Date().toLocaleString('pt-BR'),
                nome: treinoNome,
                exercicios: exercicios.map((ex, i) => {
                    const peso = localStorage.getItem(`peso_extra_${i}`) || '';
                    return peso ? `${ex} (${peso}kg)` : ex;
                })
            });
            // Mantém no máximo 50 registros
            if (hist.length > 50) hist.pop();
            localStorage.setItem('marceloHistorico', JSON.stringify(hist));
        }

        function verHistorico() {
            const hist = JSON.parse(localStorage.getItem('marceloHistorico') || '[]');

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.addEventListener('click', e => { if (e.target === modal) fecharModal(); });

            const conteudo = document.createElement('div');
            conteudo.className = 'modal-content';

            let itensHtml = '';
            if (hist.length === 0) {
                itensHtml = '<p style="text-align:center;color:#9ca3af;padding:20px;">Nenhum treino registrado ainda.</p>';
            } else {
                hist.forEach(h => {
                    itensHtml += `
                        <div class="historico-item">
                            <div class="historico-data">?? ${esc(h.data)}</div>
                            <div class="historico-nome">?? ${esc(h.nome)}</div>
                            <div class="historico-exercicios">${h.exercicios.map(e => esc(e)).join(' • ')}</div>
                        </div>
                    `;
                });
                itensHtml += `<button class="btn-limpar-hist" onclick="limparHistorico()">??? Limpar Histórico</button>`;
            }

            conteudo.innerHTML = `
                <div class="modal-header">
                    <h2>?? Histórico de Treinos</h2>
                    <p>${hist.length} treino(s) registrado(s)</p>
                </div>
                <div style="max-height:60vh;overflow-y:auto;">${itensHtml}</div>
                <div class="modal-footer">
                    <button class="btn-fechar" onclick="fecharModal()">Fechar</button>
                </div>
            `;

            modal.appendChild(conteudo);
            document.body.appendChild(modal);
        }

        function limparHistorico() {
            if (!confirm('Tem certeza que deseja apagar todo o histórico?')) return;
            localStorage.removeItem('marceloHistorico');
            fecharModal();
            mostrarNotificacao('??? Histórico apagado!', 'warning');
        }

        // =============================================
        //  EXPORTAR / IMPORTAR BACKUP
        // =============================================
        function exportarBackup() {
            const dados = {
                versao: '2.0',
                data: new Date().toISOString(),
                treinos: todosTipos,
                historico: JSON.parse(localStorage.getItem('marceloHistorico') || '[]'),
                pesos: {}
            };
            // Exportar todos os pesos salvos
            for (let k in localStorage) {
                if (k.startsWith('peso_') || k.startsWith('concluido_') || k.startsWith('series_')) {
                    dados.pesos[k] = localStorage.getItem(k);
                }
            }

            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            const dataStr = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
            a.href     = url;
            a.download = `treinos-backup-${dataStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarNotificacao('?? Backup exportado com sucesso!');
        }

        function importarBackup() {
            document.getElementById('inputImportacao').click();
        }

        function processarImportacao(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const dados = JSON.parse(e.target.result);

                    // Suporta tręs formatos:
                    // 1) Novo: { versao, treinos: [...], historico, pesos }
                    // 2) Legado: { tipos: [...] } ou { treinos: [...] } sem versao
                    // 3) Array puro: [{nome, treinos:[...]}, ...]
                    let listaTreinos, historicoImport, pesosImport;

                    if (Array.isArray(dados)) {
                        listaTreinos  = dados;
                        historicoImport = null;
                        pesosImport   = null;
                    } else if (dados.treinos && Array.isArray(dados.treinos)) {
                        listaTreinos  = dados.treinos;
                        historicoImport = dados.historico || null;
                        pesosImport   = dados.pesos     || null;
                        // Formato v3.x: histórico dentro do objeto localStorage
                        if (!historicoImport && dados.localStorage && dados.localStorage.historicoTreinos) {
                            try { historicoImport = JSON.parse(dados.localStorage.historicoTreinos); } catch(e) {}
                        }
                        // Formato v3.x: pesos/concluidos dentro do objeto localStorage
                        if (!pesosImport && dados.localStorage) {
                            pesosImport = {};
                            Object.entries(dados.localStorage).forEach(([k, v]) => {
                                if (k.startsWith('peso_') || k.startsWith('concluido_') || k.startsWith('series_')) {
                                    pesosImport[k] = v;
                                }
                            });
                            if (Object.keys(pesosImport).length === 0) pesosImport = null;
                        }
                    } else if (dados.tipos && Array.isArray(dados.tipos)) {
                        listaTreinos  = dados.tipos;
                        historicoImport = dados.historico || null;
                        pesosImport   = dados.pesos     || null;
                    } else {
                        mostrarNotificacao('? Arquivo de backup inválido!', 'error');
                        event.target.value = '';
                        return;
                    }

                    // Normaliza exercícios (objetos {nome,...} ? strings)
                    listaTreinos = normalizarExercicios(listaTreinos);

                    // Validaçăo mínima: ao menos 1 tipo com array de treinos
                    const validos = listaTreinos.filter(t => t && Array.isArray(t.treinos));
                    if (validos.length === 0) {
                        mostrarNotificacao('? Backup năo contém treinos válidos!', 'error');
                        event.target.value = '';
                        return;
                    }

                    const dataStr = dados.data
                        ? new Date(dados.data).toLocaleString('pt-BR')
                        : 'versăo antiga';

                    if (!confirm(`Restaurar backup de ${dataStr}?\n\n${validos.length} tipo(s) encontrado(s). Isso vai substituir os dados atuais.`)) {
                        event.target.value = '';
                        return;
                    }

                    // Restaurar treinos
                    listaTreinos.forEach((tipo, i) => {
                        if (!tipo || !tipo.treinos) return;
                        if (i < todosTipos.length) {
                            todosTipos[i] = tipo;
                        } else {
                            todosTipos.push(tipo);
                        }
                    });
                    salvarTodosOsTreinos();

                    // Restaurar histórico (se disponível)
                    if (historicoImport) {
                        const hist = Array.isArray(historicoImport) ? historicoImport : [];
                        localStorage.setItem('marceloHistorico', JSON.stringify(hist));
                    }

                    // Restaurar pesos/séries/concluídos (se disponível)
                    if (pesosImport) {
                        Object.entries(pesosImport).forEach(([k, v]) => {
                            localStorage.setItem(k, v);
                        });
                    }

                    carregarTreinos();
                    mostrarNotificacao('?? Backup restaurado com sucesso! (' + validos.length + ' tipos)');
                } catch (err) {
                    mostrarNotificacao('? Erro ao ler arquivo de backup!', 'error');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // =============================================
        //  NOVO TIPO DE TREINO
        // =============================================
        function novoTipoTreino() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.addEventListener('click', e => { if (e.target === modal) fecharModal(); });

            const conteudo = document.createElement('div');
            conteudo.className = 'modal-content';
            conteudo.innerHTML = `
                <div class="modal-header">
                    <h2>? Novo Tipo de Treino</h2>
                    <p>Crie um tipo personalizado com seus próprios treinos</p>
                </div>
                <div class="form-group">
                    <label>Nome do tipo (ex: "Meu Push Pull"):</label>
                    <div class="tipo-novo-form">
                        <input type="text" id="novoTipoNome" placeholder="Nome do tipo de treino..." maxlength="40">
                        <button class="btn-criar-tipo" onclick="criarNovoTipo()">Criar</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
                </div>
            `;

            modal.appendChild(conteudo);
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('novoTipoNome')?.focus(), 100);
        }

        function criarNovoTipo() {
            const nome = document.getElementById('novoTipoNome').value.trim();
            if (!nome) {
                mostrarNotificacao('?? Digite um nome para o tipo de treino', 'warning');
                return;
            }

            const novoTipo = {
                nome: nome,
                treinos: [
                    {
                        letra: 'A',
                        nome: 'Treino A',
                        descricao: 'Meu treino personalizado',
                        classe: 'treino-a',
                        exercicios: ['Exercício 1', 'Exercício 2', 'Exercício 3']
                    }
                ]
            };

            todosTipos.push(novoTipo);
            salvarTodosOsTreinos();
            fecharModal();
            carregarTreinos();
            // Selecionar o novo tipo automaticamente
            selecionarTipo(todosTipos.length - 1);
            mostrarNotificacao(`? Tipo "${nome}" criado! Edite os treinos conforme desejar.`);
        }

        // =============================================
        //  NOTIFICAÇŐES
        // =============================================
        function mostrarNotificacao(mensagem, tipo = 'success') {
            // Remove notificaçăo existente para năo acumular
            const existente = document.querySelector('.notification');
            if (existente) existente.remove();

            const notif = document.createElement('div');
            notif.className = `notification ${tipo}`;
            notif.textContent = mensagem;
            document.body.appendChild(notif);

            setTimeout(() => {
                if (document.body.contains(notif)) notif.remove();
            }, 3000);
        }

        console.log('?? Treinos Marcelo v2.0 carregado!');
    </script>
</body>
