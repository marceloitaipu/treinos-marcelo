<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💪 Treinos Marcelo - 7 Tipos</title>
    <meta name="description" content="App completo de treinos com controle de peso e edicao">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest-mobile.json">
    <meta name="theme-color" content="#0a0716">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
    <div class="header">
        <div class="header-brand">
            <div>
                <h1>💪 Treinos Marcelo</h1>
                <p>Controle completo de treinos com peso e edição personalizada</p>
            </div>
            <span class="version-badge">v4.0</span>
        </div>
        <div class="header-acoes">
            <button class="btn-acao-header btn-backup"    onclick="exportarBackup()">💾 Exportar Backup</button>
            <button class="btn-acao-header btn-restaurar" onclick="importarBackup()">📂 Restaurar Backup</button>
            <button class="btn-acao-header btn-historico" onclick="verHistorico()">📊 Histórico</button>
            <button class="btn-acao-header btn-evolucao"  onclick="verEvolucao()">📈 Evolução</button>
            <button class="btn-acao-header btn-novo-tipo"  onclick="novoTipoTreino()">➕ Novo Tipo</button>
            <button class="btn-acao-header btn-del-tipo"   onclick="deletarTipoAtual()">🗑️ Deletar Tipo</button>
            <button class="btn-acao-header btn-add-treino" onclick="novoTreinoNoTipo()">📋 Novo Treino</button>
        </div>
    </div>

    <!-- Input oculto para importar arquivo JSON -->
    <input type="file" id="inputImportacao" accept=".json" style="display:none" onchange="processarImportacao(event)">

    <div class="tipo-selector" id="tipoSelector">
        <!-- Botões dos tipos serão inseridos aqui -->
    </div>

    <div class="treinos-grid" id="treinosContainer">
        <!-- Cards dos treinos serão inseridos aqui -->
    </div>


    <!-- Módulos JS — ordem de carregamento obrigatória -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/series.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/treinos.js"></script>
    <script src="js/treino-session.js"></script>
    <script src="js/historico-detalhado.js"></script>
    <script src="js/historico.js"></script>
    <script src="js/evolucao.js"></script>
    <script src="js/backup.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Registro do Service Worker (habilita PWA offline)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js')
                    .then(function (reg) { console.log('SW registrado:', reg.scope); })
                    .catch(function (err) { console.warn('SW nao registrado:', err); });
            });
        }
    </script>
    </div><!-- /.app-wrapper -->
</body>
</html>
