<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💪 Treinos Marcelo - 7 Tipos</title>
    <meta name="description" content="App completo de treinos com controle de peso e edição">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest-mobile.json">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p1: #2d1b69;   /* roxo escuro */
            --p2: #6c3fc5;   /* roxo médio */
            --p3: #9b59e8;   /* lilás */
            --p4: #c084fc;   /* lavanda */
            --p5: #e9d5ff;   /* branco-roxo */
            --accent: #a78bfa;
            --accent2: #7c3aed;
            --card-bg: rgba(109,40,217,0.08);
            --card-border: rgba(167,139,250,0.15);
            --modal-bg: rgba(15,10,35,0.97);
            --text-main: #f0ebff;
            --text-muted: #9e8ec4;
            --bg-base: #0a0716;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-base);
            background-image:
                radial-gradient(ellipse 90% 60% at 50% -10%, rgba(109,40,217,0.28) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 90% 90%, rgba(76,29,149,0.18) 0%, transparent 55%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        /* ===== LAYOUT CONTAINER ===== */
        .app-wrapper {
            max-width: 960px;
            margin: 0 auto;
        }

        /* ===== CABEÇALHO ===== */
        .header {
            text-align: center;
            padding: 28px 20px 20px;
            background: linear-gradient(160deg, rgba(109,40,217,0.22) 0%, rgba(76,29,149,0.12) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            margin-bottom: 16px;
            border: 1px solid rgba(167,139,250,0.18);
            box-shadow: 0 2px 40px rgba(109,40,217,0.2), 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--p2), var(--p4), var(--p3), var(--accent));
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff 0%, var(--p5) 40%, var(--accent) 75%, var(--p3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header > p {
            color: var(--text-muted);
            font-size: 0.88em;
            font-weight: 500;
        }

        .header-acoes {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn-acao-header {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-backup    { background: rgba(109,40,217,0.25); color: var(--p4);   border: 1px solid rgba(109,40,217,0.45); }
        .btn-restaurar { background: rgba(124,58,237,0.2);  color: var(--accent); border: 1px solid rgba(124,58,237,0.4); }
        .btn-historico { background: rgba(76,29,149,0.25);  color: var(--p5);   border: 1px solid rgba(76,29,149,0.45); }
        .btn-novo-tipo { background: rgba(139,92,246,0.2);  color: #ddd6fe;     border: 1px solid rgba(139,92,246,0.4); }

        .btn-acao-header:hover {
            filter: brightness(1.35);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(109,40,217,0.3);
        }

        /* ===== SELETOR DE TIPO ===== */
        .tipo-selector {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            justify-content: flex-start;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 2px 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .tipo-selector::-webkit-scrollbar { display: none; }

        .tipo-btn {
            padding: 9px 18px;
            border: 1px solid rgba(167,139,250,0.18);
            border-radius: 24px;
            background: rgba(109,40,217,0.1);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 700;
            font-size: 0.84em;
            letter-spacing: 0.02em;
            white-space: nowrap;
            flex-shrink: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tipo-btn:hover {
            background: rgba(124,58,237,0.2);
            color: var(--p5);
            border-color: rgba(167,139,250,0.35);
            transform: translateY(-1px);
        }

        .tipo-btn.active {
            background: linear-gradient(135deg, var(--accent2), var(--p3));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 18px rgba(109,40,217,0.5);
        }

        .tipo-btn:active { transform: scale(0.95); }

        /* ===== GRID DE TREINOS ===== */
        .treinos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        /* ===== CARDS ===== */
        .treino-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .treino-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .treino-a::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
        .treino-b::before { background: linear-gradient(90deg, #6d28d9, #c4b5fd); }
        .treino-c::before { background: linear-gradient(90deg, #4c1d95, #8b5cf6); }
        .treino-d::before { background: linear-gradient(90deg, #9333ea, #d8b4fe); }
        .treino-e::before { background: linear-gradient(90deg, #5b21b6, #a78bfa); }

        .treino-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 40px rgba(109,40,217,0.25);
            border-color: rgba(167,139,250,0.28);
        }

        .treino-card:active { transform: translateY(-2px) scale(0.99); }

        .treino-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .treino-letra {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.3em;
            margin-right: 14px;
            flex-shrink: 0;
            color: #fff;
        }

        .treino-a .treino-letra { background: linear-gradient(135deg, #7c3aed, #a78bfa); box-shadow: 0 4px 16px rgba(124,58,237,0.45); }
        .treino-b .treino-letra { background: linear-gradient(135deg, #6d28d9, #c4b5fd); box-shadow: 0 4px 16px rgba(109,40,217,0.45); }
        .treino-c .treino-letra { background: linear-gradient(135deg, #4c1d95, #8b5cf6); box-shadow: 0 4px 16px rgba(76,29,149,0.45); }
        .treino-d .treino-letra { background: linear-gradient(135deg, #9333ea, #d8b4fe); box-shadow: 0 4px 16px rgba(147,51,234,0.45); }
        .treino-e .treino-letra { background: linear-gradient(135deg, #5b21b6, #a78bfa); box-shadow: 0 4px 16px rgba(91,33,182,0.45); }

        .treino-info h3 {
            font-size: 1em;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .treino-info p {
            color: var(--text-muted);
            font-size: 0.82em;
            font-weight: 500;
        }

        .serie-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(109,40,217,0.2);
            border: 1px solid rgba(167,139,250,0.35);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.77em;
            font-weight: 700;
            color: var(--accent);
            margin-top: 5px;
        }

        .serie-badge.completo {
            background: rgba(91,33,182,0.25);
            border-color: rgba(196,181,253,0.5);
            color: var(--p5);
        }

        .treino-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-iniciar {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent2), var(--p3));
            color: #fff;
            font-weight: 800;
            font-size: 0.88em;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 16px rgba(109,40,217,0.4);
        }

        .btn-iniciar:hover { transform: scale(1.03); box-shadow: 0 6px 24px rgba(109,40,217,0.55); }
        .btn-iniciar:active { transform: scale(0.97); }

        .btn-edit {
            padding: 12px 16px;
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 12px;
            background: rgba(109,40,217,0.12);
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 1em;
        }

        .btn-edit:hover { background: rgba(109,40,217,0.25); border-color: rgba(167,139,250,0.4); transform: scale(1.05); }
        .btn-edit:active { transform: scale(0.95); }

        /* ===== MODAIS ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,2,20,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 14px;
        }

        .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(30px);
            border-radius: 22px;
            padding: 26px;
            max-width: 500px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            border: 1px solid rgba(167,139,250,0.15);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(109,40,217,0.2);
            position: relative;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            border-radius: 22px 22px 0 0;
            background: linear-gradient(90deg, var(--p2), var(--accent), var(--p4));
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin-bottom: 6px;
            font-size: 1.35em;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--p4), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-header p { color: var(--text-muted); font-size: 0.86em; }

        /* ===== EXERCÍCIOS NO MODAL ===== */
        .exercicio-item {
            background: rgba(109,40,217,0.07);
            border: 1px solid rgba(167,139,250,0.1);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .exercicio-item:hover { background: rgba(109,40,217,0.13); border-color: rgba(167,139,250,0.2); }

        .exercicio-item.concluido {
            background: rgba(91,33,182,0.18);
            border-color: rgba(196,181,253,0.3);
        }

        .exercicio-info { flex: 1; min-width: 0; }

        .exercicio-nome {
            font-weight: 700;
            font-size: 0.93em;
            margin-bottom: 4px;
            color: var(--text-main);
            word-break: break-word;
        }

        .exercicio-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .peso-input {
            width: 66px;
            padding: 8px 6px;
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 8px;
            background: rgba(109,40,217,0.1);
            color: #fff;
            text-align: center;
            font-size: 0.95em;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s;
        }

        .peso-input:focus { border-color: var(--accent); background: rgba(124,58,237,0.15); }
        .peso-input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-concluir {
            padding: 7px 12px;
            border-radius: 8px;
            background: rgba(109,40,217,0.15);
            border: 1px solid rgba(167,139,250,0.3);
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .btn-concluir:hover { background: rgba(124,58,237,0.3); }
        .btn-concluir.concluido { background: rgba(91,33,182,0.3); border-color: var(--accent); color: var(--p5); }
        .btn-concluir:active { transform: scale(0.95); }

        .series-info { font-size: 0.77em; color: var(--text-muted); margin-top: 3px; font-weight: 500; }

        .series-controles { display: flex; align-items: center; gap: 6px; margin-top: 8px; }

        .serie-btn {
            width: 30px; height: 30px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1em;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .serie-btn.menos { background: rgba(109,40,217,0.15); border: 1px solid rgba(167,139,250,0.25); color: var(--p4); }
        .serie-btn.mais  { background: rgba(124,58,237,0.2);  border: 1px solid rgba(167,139,250,0.35); color: var(--p5); }
        .serie-btn:hover { filter: brightness(1.3); transform: scale(1.1); }
        .serie-btn:active { transform: scale(0.9); }

        .serie-contador {
            font-weight: 900; font-size: 1em;
            min-width: 36px; text-align: center;
            color: var(--accent);
        }

        /* ===== FOOTER DOS MODAIS ===== */
        .modal-footer { text-align: center; margin-top: 20px; }

        .btn-fechar {
            padding: 12px 32px;
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(109,40,217,0.3), rgba(91,33,182,0.2));
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            font-size: 0.93em;
            letter-spacing: 0.03em;
        }

        .btn-fechar:hover {
            background: linear-gradient(135deg, rgba(109,40,217,0.5), rgba(91,33,182,0.4));
            box-shadow: 0 4px 18px rgba(109,40,217,0.35);
            transform: translateY(-1px);
        }

        /* ===== TIMER ===== */
        .timer-container {
            background: linear-gradient(135deg, rgba(91,33,182,0.15), rgba(109,40,217,0.1));
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 18px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(109,40,217,0.15);
        }

        .timer-titulo { font-size: 0.73em; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--p4); margin-bottom: 8px; }

        .timer-progress { width: 100%; height: 4px; background: rgba(255,255,255,0.07); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        .timer-progress-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--p2), var(--accent), var(--p4)); transition: width 0.9s linear; }

        .timer-display {
            font-size: 3.2em; font-weight: 900; font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em; margin-bottom: 8px; transition: color 0.3s, text-shadow 0.3s;
        }
        .timer-display.urgente { color: #e879f9; text-shadow: 0 0 20px rgba(232,121,249,0.6); }
        .timer-display.normal  { color: var(--p4);  text-shadow: 0 0 16px rgba(192,132,252,0.4); }

        .timer-config { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .timer-config label { font-size: 0.82em; color: var(--text-muted); font-weight: 600; }

        .timer-input {
            width: 66px; padding: 6px 8px; border: 1px solid rgba(167,139,250,0.3);
            border-radius: 8px; background: rgba(109,40,217,0.1); color: #fff;
            text-align: center; font-size: 1em; font-weight: 700; font-family: inherit; outline: none;
        }
        .timer-input:focus { border-color: var(--accent); }

        .timer-btn-set {
            padding: 7px 13px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent2), var(--p3));
            color: white; cursor: pointer; font-size: 0.8em; font-weight: 700; transition: all 0.2s;
        }
        .timer-btn-set:hover { filter: brightness(1.2); transform: scale(1.04); }

        .timer-controles { display: flex; gap: 10px; justify-content: center; }

        .timer-btn {
            padding: 10px 20px; border: none; border-radius: 10px;
            font-weight: 800; cursor: pointer; transition: all 0.2s;
            font-size: 0.86em; letter-spacing: 0.02em;
        }
        .timer-btn.play  { background: linear-gradient(135deg, var(--accent2), var(--p3)); color: white; box-shadow: 0 4px 14px rgba(109,40,217,0.4); }
        .timer-btn.pause { background: linear-gradient(135deg, #6b21a8, #a21caf); color: white; box-shadow: 0 4px 14px rgba(107,33,168,0.4); }
        .timer-btn.reset { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); color: var(--text-muted); }
        .timer-btn:hover { filter: brightness(1.15); transform: scale(1.04); }
        .timer-btn:active { transform: scale(0.95); }

        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
        .timer-display.fim { animation: piscar 0.5s infinite; color: #e879f9; text-shadow: 0 0 28px rgba(232,121,249,0.7); }

        /* ===== MODAL DE EDIÇÃO ===== */
        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block; margin-bottom: 7px; font-weight: 700;
            font-size: 0.8em; letter-spacing: 0.06em; text-transform: uppercase; color: var(--p4);
        }

        .form-group input, .form-group textarea {
            width: 100%; padding: 11px 13px;
            border: 1px solid rgba(167,139,250,0.15);
            border-radius: 10px; background: rgba(109,40,217,0.08);
            color: var(--text-main); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); background: rgba(124,58,237,0.1); }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.28); }

        .exercicios-lista {
            max-height: 260px; overflow-y: auto;
            border: 1px solid rgba(167,139,250,0.12); border-radius: 12px;
            padding: 10px; background: rgba(0,0,0,0.25);
            scrollbar-width: thin; scrollbar-color: rgba(167,139,250,0.2) transparent;
        }

        .exercicio-edit {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px; padding: 9px 10px;
            background: rgba(109,40,217,0.08); border: 1px solid rgba(167,139,250,0.1);
            border-radius: 10px; transition: background 0.2s;
        }
        .exercicio-edit:hover { background: rgba(109,40,217,0.14); }

        .exercicio-input {
            flex: 1; padding: 8px 10px; border: 1px solid rgba(167,139,250,0.12);
            border-radius: 7px; background: rgba(109,40,217,0.1);
            color: var(--text-main); font-size: 0.93em; font-family: inherit; outline: none;
        }
        .exercicio-input:focus { border-color: var(--accent); background: rgba(124,58,237,0.1); }

        .btn-remove {
            background: rgba(109,40,217,0.15); border: 1px solid rgba(167,139,250,0.25);
            color: var(--p4); border-radius: 50%;
            width: 30px; height: 30px; min-width: 30px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1em; transition: all 0.2s;
        }
        .btn-remove:hover { background: rgba(147,51,234,0.35); color: #fff; }

        .btn-add {
            width: 100%; padding: 11px;
            border: 1px dashed rgba(167,139,250,0.3); border-radius: 10px;
            background: rgba(109,40,217,0.07); color: var(--accent);
            cursor: pointer; margin-top: 8px; font-weight: 700; font-size: 0.88em; transition: all 0.2s;
        }
        .btn-add:hover { background: rgba(109,40,217,0.18); border-color: var(--accent); }

        //  UTILITÁRIOS DE SEGURANÇA
        // =============================================
        function esc(str) {
            // Escapa texto para inserção segura em HTML (previne XSS)
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>

        //  ESTADO DA APLICAÇÃO
        // =============================================
        let tipoAtualIndex = 0;

        // =============================================
        //  TIMER DE DESCANSO
        // =============================================
        let timerInterval = null;
        let timerTotal    = 60;
        let timerAtual    = 60;
        let timerRodando  = false;
        let _timerModalId = null; // ID do modal que criou o timer

        function criarTimerHTML(descansoSugerido) {
            const seg = descansoSugerido || 60;
            return `
            <div class="timer-container" id="timerBox">
                <div class="timer-titulo">⏱️ TIMER DE DESCANSO</div>
                <div class="timer-progress"><div class="timer-progress-bar" id="timerBar" style="width:0%"></div></div>
                <div class="timer-display normal" id="timerDisplay">01:00</div>
                <div class="timer-config">
                    <label>Tempo (s):</label>
                    <input type="number" class="timer-input" id="timerInputSeg" min="5" max="600" value="${seg}">
                    <button class="timer-btn-set" onclick="definirTimer()">OK</button>
                </div>
                <div class="timer-controles">
                    <button class="timer-btn play" id="timerBtnPlay" onclick="toggleTimer()">▶️ Iniciar</button>
                    <button class="timer-btn reset" onclick="resetarTimer()">🔄 Reset</button>
                </div>
            </div>`;
        }

        function definirTimer() {
            const input = document.getElementById('timerInputSeg');
            const val   = parseInt(input.value);
            if (!val || val < 5 || val > 600) {
                mostrarNotificacao('⚠️ Digite um tempo entre 5 e 600 segundos', 'warning');
                return;
            }
            pararTimer();
            timerTotal  = val;
            timerAtual  = val;
            atualizarDisplayTimer();
        }

        function toggleTimer() {
            if (timerRodando) {
                pararTimer();
            } else {
                iniciarTimer();
            }
        }

        function iniciarTimer() {
            if (timerAtual <= 0) resetarTimer();
            timerRodando = true;
            const btn = document.getElementById('timerBtnPlay');
            if (btn) { btn.textContent = '⏸️ Pausar'; btn.className = 'timer-btn pause'; }

            timerInterval = setInterval(() => {
                timerAtual--;
                atualizarDisplayTimer();
                if (timerAtual <= 0) {
                    pararTimer();
                    timerConcluido();
                }
            }, 1000);
        }

        function pararTimer() {
            timerRodando = false;
            clearInterval(timerInterval);
            timerInterval = null;
            const btn = document.getElementById('timerBtnPlay');
            if (btn) { btn.textContent = '▶️ Iniciar'; btn.className = 'timer-btn play'; }
        }

        function resetarTimer() {
            pararTimer();
            timerAtual = timerTotal;
            atualizarDisplayTimer();
            const display = document.getElementById('timerDisplay');
            if (display) display.classList.remove('fim');
        }

        function atualizarDisplayTimer() {
            const display = document.getElementById('timerDisplay');
            const bar     = document.getElementById('timerBar');
            if (!display) return;

            const mins = Math.floor(timerAtual / 60);
            const secs = timerAtual % 60;
            display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

            const pct = timerTotal > 0 ? ((timerTotal - timerAtual) / timerTotal) * 100 : 0;
            if (bar) bar.style.width = pct + '%';

            // Cor: vermelho quando < 10s
            display.className = 'timer-display ' + (timerAtual <= 10 ? 'urgente' : 'normal');
        }

        function timerConcluido() {
            const display = document.getElementById('timerDisplay');

                if (!tipo || !Array.isArray(tipo.treinos)) return tipo;

                    if (!Array.isArray(t.exercicios)) return t;
                    t.exercicios = t.exercicios.map(function(ex) {
                        return (typeof ex === 'object' && ex !== null && ex.nome) ? ex.nome : String(ex);
                    });
                    return t;
                });
                return tipo;
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            console.log('💪 Inicializando Treinos Marcelo com 7 tipos...');
            carregarTreinosSalvos();
            carregarTreinos();

            // Fechar modal com Escape
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') fecharModal();
            });

            console.log('✅ App carregado!');
        });

        function carregarTreinosSalvos() {
            // Suporta chave nova ('marceloTreinos') e legada ('marceloTreinosV2', 'treinos')
            const raw = localStorage.getItem('marceloTreinos')
                     || localStorage.getItem('marceloTreinosV2')
                     || localStorage.getItem('treinos');
            if (!raw) return;
            try {
                const dados = JSON.parse(raw);
                const lista = Array.isArray(dados) ? dados : (dados.treinos || dados.tipos || []);
                if (!Array.isArray(lista) || lista.length === 0) return;
                const normalizada = normalizarExercicios(lista);
                normalizada.forEach((tipo, i) => {
                    if (!tipo || !tipo.treinos) return;
                    if (i < todosTipos.length) {
                        todosTipos[i] = tipo;
                    } else {
                        todosTipos.push(tipo);
                    }
                });
                // Migra histórico legado (chave 'historicoTreinos' → 'marceloHistorico')
                const histLegado = localStorage.getItem('historicoTreinos');
                if (histLegado && !localStorage.getItem('marceloHistorico')) {
                    localStorage.setItem('marceloHistorico', histLegado);
                }
                console.log('✅ Treinos carregados (' + normalizada.length + ' tipos)');
            } catch (e) {
                console.warn('⚠️ Erro ao carregar treinos salvos, usando padrões');
            }
        }

        function salvarTodosOsTreinos() {
            localStorage.setItem('marceloTreinos', JSON.stringify(todosTipos));
        }

        // =============================================
        //  NAVEGAÇÃO PRINCIPAL
        // =============================================
        function carregarTreinos() {
            const tipoSelector = document.getElementById('tipoSelector');
            tipoSelector.innerHTML = '';

            todosTipos.forEach((tipo, index) => {
                const btn = document.createElement('button');
                btn.className = 'tipo-btn' + (index === tipoAtualIndex ? ' active' : '');
                btn.textContent = tipo.nome;
                btn.onclick = () => selecionarTipo(index);
                tipoSelector.appendChild(btn);
            });

            carregarTreinosTipo(tipoAtualIndex);
        }

        function selecionarTipo(index) {
            tipoAtualIndex = index;
            document.querySelectorAll('.tipo-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            carregarTreinosTipo(index);
        }

        function carregarTreinosTipo(tipoIndex) {
            const container = document.getElementById('treinosContainer');
            const tipo = todosTipos[tipoIndex];
            container.innerHTML = '';

            tipo.treinos.forEach((treino, index) => {
                const card = document.createElement('div');
                card.className = 'treino-card ' + treino.classe;

                // Contar exercícios concluídos
                let totalConcluidos = 0;
                treino.exercicios.forEach((_, i) => {
                    if (localStorage.getItem(`concluido_${tipoIndex}_${index}_${i}`) === 'true') totalConcluidos++;
                });
                const progresso = treino.exercicios.length > 0
                    ? Math.round((totalConcluidos / treino.exercicios.length) * 100) : 0;

                card.innerHTML = `
                    <div class="treino-header">
                        <div class="treino-letra">${esc(treino.letra)}</div>
                        <div class="treino-info">
                            <h3>${esc(treino.nome)}</h3>
                            <p>${esc(treino.descricao)}</p>
                            ${progresso > 0 ? `<span class="serie-badge ${progresso === 100 ? 'completo' : ''}">
                                ${progresso === 100 ? '✅' : '🏃'} ${progresso}% feito
                            </span>` : ''}
                        </div>
                    </div>
                    <div class="treino-actions">
                        <button class="btn-iniciar" onclick="iniciarTreino(${index})">
                            🚀 Iniciar Treino
                        </button>
                        <button class="btn-edit" onclick="editarTreino(${index})" title="Editar treino">
                            ✏️
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        //  MODAL INICIAR TREINO

        function fecharTreinoModal(tipoIndex, treinoIndex) {
            pararTimer();

        // =============================================
        //  PESO / SÉRIES / CONCLUSÃO
        // =============================================
        function salvarPeso(tipoIndex, treinoIndex, exercicioIndex, peso) {
            // BUG FIX: rejeitar negativos
            const val = parseFloat(peso);
            const input = document.getElementById(`pesoInput_${exercicioIndex}`);
            if (isNaN(val) || val < 0) {
                if (input) input.value = '';
                localStorage.removeItem(`peso_${tipoIndex}_${treinoIndex}_${exercicioIndex}`);
                mostrarNotificacao('⚠️ Peso deve ser 0 ou positivo', 'warning');
                return;
            }
            localStorage.setItem(`peso_${tipoIndex}_${treinoIndex}_${exercicioIndex}`, val);
        }

        function ajustarSeries(tipoIndex, treinoIndex, exercicioIndex, delta) {
            const key     = `series_${tipoIndex}_${treinoIndex}_${exercicioIndex}`;
            const atual   = parseInt(localStorage.getItem(key)) || 0;
            const novo    = Math.max(0, atual + delta);
            localStorage.setItem(key, novo);

            const contador = document.getElementById(`serieCount_${exercicioIndex}`);
            const info     = document.getElementById(`seriesInfo_${exercicioIndex}`);
            if (contador) contador.textContent = novo;
            if (info) info.textContent = novo > 0 ? `${novo} série(s) feita(s)` : '';

            // Auto-iniciar timer ao confirmar uma série
            if (delta > 0) {
                resetarTimer();
                iniciarTimer();
                mostrarNotificacao('⏱️ Timer de descanso iniciado!');
            }
        }

        function toggleConcluido(tipoIndex, treinoIndex, exercicioIndex, button) {
            const key = `concluido_${tipoIndex}_${treinoIndex}_${exercicioIndex}`;
            const item = button.closest('.exercicio-item');
            const jaFeito = item.classList.contains('concluido');

            if (jaFeito) {
                item.classList.remove('concluido');
                button.classList.remove('concluido');
                button.textContent = 'Concluir';
                localStorage.removeItem(key);
                mostrarNotificacao('↩️ Exercício desmarcado');
            } else {
                item.classList.add('concluido');
                button.classList.add('concluido');
                button.textContent = '✓ Feito';
                localStorage.setItem(key, 'true');
                mostrarNotificacao('✅ Exercício concluído!');
            }
        }

        function criarItemExercicioEdicao(nomeExercicio, i) {
            const div = document.createElement('div');
            div.className = 'exercicio-edit';

            const btn = document.createElement('button');
            btn.className = 'btn-remove';
            btn.textContent = '×';
            btn.onclick = () => removerExercicio(div);

            const input = document.createElement('input');
            input.type = 'text';
            input.value = nomeExercicio; // valor definido via .value — sem risco de XSS
            input.className = 'exercicio-input';
            input.dataset.index = i;
            input.placeholder = 'Nome do exercício';

            div.appendChild(btn);
            div.appendChild(input);

        function removerExercicio(itemDiv) {
            const lista   = document.getElementById('exercicios-lista');
            const itens   = lista.querySelectorAll('.exercicio-edit');
            if (itens.length <= 1) {
                mostrarNotificacao('⚠️ Não é possível remover o último exercício!', 'warning');
                return;
            }
            itemDiv.remove();
            // Reindexar data-index
            lista.querySelectorAll('.exercicio-edit').forEach((el, idx) => {
                el.querySelector('.exercicio-input').dataset.index = idx;
            });
            mostrarNotificacao('🗑️ Exercício removido!', 'warning');

        function adicionarExercicio() {
            const lista     = document.getElementById('exercicios-lista');
            const btnAdd    = lista.querySelector('.btn-add');
            const novos     = lista.querySelectorAll('.exercicio-edit');
            const novoItem  = criarItemExercicioEdicao('Novo Exercício', novos.length);
            lista.insertBefore(novoItem, btnAdd);
            const inp = novoItem.querySelector('.exercicio-input');
            inp.focus();
            inp.select();
            mostrarNotificacao('➕ Novo exercício adicionado!');
        }

        function salvarEdicaoTreino(index) {
            const novoNome = document.getElementById('edit-nome').value.trim();
            const novaDesc = document.getElementById('edit-descricao').value.trim();

            if (!novoNome) {
                mostrarNotificacao('⚠️ Nome do treino é obrigatório!', 'warning');
                return;
            }

            const inputs = document.querySelectorAll('#exercicios-lista .exercicio-input');
            const novosExercicios = [];
            inputs.forEach(inp => {
                const v = inp.value.trim();
                if (v) novosExercicios.push(v);
            });

            if (novosExercicios.length === 0) {
                mostrarNotificacao('⚠️ Pelo menos um exercício é obrigatório!', 'warning');
                return;
            }

            todosTipos[tipoAtualIndex].treinos[index].nome       = novoNome;
            todosTipos[tipoAtualIndex].treinos[index].descricao  = novaDesc;
            todosTipos[tipoAtualIndex].treinos[index].exercicios = novosExercicios;

            salvarTodosOsTreinos();
            fecharModal();
            carregarTreinos();
            mostrarNotificacao('💾 Treino salvo com sucesso!');

        // =============================================
        //  HISTÓRICO DE TREINOS
        // =============================================
        function registrarHistorico(tipoIndex, treinoIndex, treinoNome, exercicios) {
            const hist = JSON.parse(localStorage.getItem('marceloHistorico') || '[]');
            hist.unshift({
                data: new Date().toLocaleString('pt-BR'),
                nome: treinoNome,
                exercicios: exercicios.map((ex, i) => {
                    const peso = localStorage.getItem(`peso_${tipoIndex}_${treinoIndex}_${i}`) || '';
                    return peso ? `${ex} (${peso}kg)` : ex;
                })
            });
            // Mantém no máximo 50 registros
            if (hist.length > 50) hist.pop();
            localStorage.setItem('marceloHistorico', JSON.stringify(hist));
        }

        function verHistorico() {
            const hist = JSON.parse(localStorage.getItem('marceloHistorico') || '[]');

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.addEventListener('click', e => { if (e.target === modal) fecharModal(); });

            const conteudo = document.createElement('div');
            conteudo.className = 'modal-content';

                        <div class="historico-item">
                            <div class="historico-data">📅 ${esc(h.data)}</div>
                            <div class="historico-nome">💪 ${esc(h.nome)}</div>
                            <div class="historico-exercicios">${h.exercicios.map(e => esc(e)).join(' • ')}</div>
                        </div>
                    `;
                });
                itensHtml += `<button class="btn-limpar-hist" onclick="limparHistorico()">🗑️ Limpar Histórico</button>`;
            }

            conteudo.innerHTML = `
                <div class="modal-header">

        // =============================================
        //  EXPORTAR / IMPORTAR BACKUP
        // =============================================
        function exportarBackup() {
            const dados = {
                versao: '2.0',
                data: new Date().toISOString(),
                treinos: todosTipos,
                historico: JSON.parse(localStorage.getItem('marceloHistorico') || '[]'),
                pesos: {}
            };
            // Exportar todos os pesos salvos
            Object.keys(localStorage).forEach(k => {
                if (k.startsWith('peso_') || k.startsWith('concluido_') || k.startsWith('series_')) {
                    dados.pesos[k] = localStorage.getItem(k);
                }
            });

            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            const dataStr = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
            a.href     = url;
            a.download = `treinos-backup-${dataStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarNotificacao('💾 Backup exportado com sucesso!');
        }

        function importarBackup() {
            document.getElementById('inputImportacao').click();
        }

        function processarImportacao(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const dados = JSON.parse(e.target.result);

                    // Suporta três formatos:
                    // 1) Novo: { versao, treinos: [...], historico, pesos }
                    // 2) Legado: { tipos: [...] } ou { treinos: [...] } sem versao
                    // 3) Array puro: [{nome, treinos:[...]}, ...]
                    let listaTreinos, historicoImport, pesosImport;

                    if (Array.isArray(dados)) {
                        listaTreinos  = dados;
                        historicoImport = null;
                        pesosImport   = null;
                    } else if (dados.treinos && Array.isArray(dados.treinos)) {
                        listaTreinos  = dados.treinos;
                        historicoImport = dados.historico || null;
                        pesosImport   = dados.pesos     || null;
                        // Formato v3.x: histórico dentro do objeto localStorage
                        if (!historicoImport && dados.localStorage && dados.localStorage.historicoTreinos) {
                            try { historicoImport = JSON.parse(dados.localStorage.historicoTreinos); } catch(e) {}
                        }
                        // Formato v3.x: pesos/concluidos dentro do objeto localStorage
                        if (!pesosImport && dados.localStorage) {
                            pesosImport = {};
                            Object.entries(dados.localStorage).forEach(([k, v]) => {
                                if (k.startsWith('peso_') || k.startsWith('concluido_') || k.startsWith('series_')) {
                                    pesosImport[k] = v;
                                }
                            });
                            if (Object.keys(pesosImport).length === 0) pesosImport = null;
                        }
                    } else if (dados.tipos && Array.isArray(dados.tipos)) {
                        listaTreinos  = dados.tipos;
                        historicoImport = dados.historico || null;
                        pesosImport   = dados.pesos     || null;
                    } else {
                        mostrarNotificacao('❌ Arquivo de backup inválido!', 'error');
                        event.target.value = '';
                        return;
                    }

                    // Normaliza exercícios (objetos {nome,...} → strings)
                    listaTreinos = normalizarExercicios(listaTreinos);

                    // Validação mínima: ao menos 1 tipo com array de treinos
                    const validos = listaTreinos.filter(t => t && Array.isArray(t.treinos));
                    if (validos.length === 0) {
                        mostrarNotificacao('❌ Backup não contém treinos válidos!', 'error');
                        event.target.value = '';
                        return;
                    }

                    const dataStr = dados.data
                        ? new Date(dados.data).toLocaleString('pt-BR')
                        : 'versão antiga';

                    if (!confirm(`Restaurar backup de ${dataStr}?\n\n${validos.length} tipo(s) encontrado(s). Isso vai substituir os dados atuais.`)) {
                        event.target.value = '';
                        return;
                    }

                    // Restaurar treinos
                    listaTreinos.forEach((tipo, i) => {
                        if (!tipo || !tipo.treinos) return;
                        if (i < todosTipos.length) {
                            todosTipos[i] = tipo;
                        } else {
                            todosTipos.push(tipo);
                        }
                    });
                    salvarTodosOsTreinos();

                    // Restaurar histórico (se disponível)
                    if (historicoImport) {
                        const hist = Array.isArray(historicoImport) ? historicoImport : [];
                        localStorage.setItem('marceloHistorico', JSON.stringify(hist));
                    }

                    // Restaurar pesos/séries/concluídos (se disponível)
                    if (pesosImport) {
                        Object.entries(pesosImport).forEach(([k, v]) => {
                            localStorage.setItem(k, v);
                        });
                    }

                    carregarTreinos();
                    mostrarNotificacao('📂 Backup restaurado com sucesso! (' + validos.length + ' tipos)');
                } catch (err) {
                    mostrarNotificacao('❌ Erro ao ler arquivo de backup!', 'error');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // =============================================
        //  NOVO TIPO DE TREINO
        // =============================================
        function novoTipoTreino() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.addEventListener('click', e => { if (e.target === modal) fecharModal(); });

            const conteudo = document.createElement('div');
            conteudo.className = 'modal-content';
            conteudo.innerHTML = `
                <div class="modal-header">
                    <h2>➕ Novo Tipo de Treino</h2>
                    <p>Crie um tipo personalizado com seus próprios treinos</p>
                </div>
                <div class="form-group">
                    <label>Nome do tipo (ex: "Meu Push Pull"):</label>
                    <div class="tipo-novo-form">
                        <input type="text" id="novoTipoNome" placeholder="Nome do tipo de treino..." maxlength="40">
                        <button class="btn-criar-tipo" onclick="criarNovoTipo()">Criar</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-fechar" onclick="fecharModal()">Cancelar</button>
                </div>
            `;

            modal.appendChild(conteudo);
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('novoTipoNome')?.focus(), 100);
        }

        function criarNovoTipo() {
            const nome = document.getElementById('novoTipoNome').value.trim();
            if (!nome) {
                mostrarNotificacao('⚠️ Digite um nome para o tipo de treino', 'warning');
                return;
            }

            const novoTipo = {
                nome: nome,
                treinos: [
                    {
                        letra: 'A',
                        nome: 'Treino A',
                        descricao: 'Meu treino personalizado',
                        classe: 'treino-a',
                        exercicios: ['Exercício 1', 'Exercício 2', 'Exercício 3']
                    }
                ]
            };

            todosTipos.push(novoTipo);
            salvarTodosOsTreinos();
            fecharModal();
            carregarTreinos();
            // Selecionar o novo tipo automaticamente
            selecionarTipo(todosTipos.length - 1);
            mostrarNotificacao(`✅ Tipo "${nome}" criado! Edite os treinos conforme desejar.`);
        }

        // =============================================
        //  NOTIFICAÇÕES
        // =============================================
        function mostrarNotificacao(mensagem, tipo = 'success') {
            // Remove notificação existente para não acumular
            const existente = document.querySelector('.notification');
            if (existente) existente.remove();

            const notif = document.createElement('div');
            notif.className = `notification ${tipo}`;
            notif.textContent = mensagem;
            document.body.appendChild(notif);

            setTimeout(() => {
                if (document.body.contains(notif)) notif.remove();
            }, 3000);
        }

        console.log('💪 Treinos Marcelo v2.0 carregado!');
    </script>
    </div><!-- /.app-wrapper -->
</body>
</html>
